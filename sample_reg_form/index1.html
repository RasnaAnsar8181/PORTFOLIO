<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <div class="container">
        <div class="sub-container">
            <form action="#">
                <div class="header">
                    <h1>Registration Form</h1>
                    <h4>Fill out the form carefully for registration</h4>
                </div>

                <div class="sub-container content">
                    
                    <div class="div1">
                        <div class="div11"><label for="name">Student Name</label></div>
                        <div class="div-child">
                            <div class="div-w"><input type="text" name="sname" ><span>First Name</span></div>
                            <div class="div-w"><input type="text" name="sname" ><span>Last Name</span></div>
                        </div>
                    </div>
                    
                    <div class="div2 div-child">
                        <div class="div-w"><label for="gender">Gender</label>
                            <select class="inp" name="gender" id="gender">
                                <option value="please select">please select</option>
                                <option value="one">male</option>
                                <option value="two">female</option>
                            </select>
                        </div>
                        <div class="div-w"><label for="email">Student E-mail</label><input type="email" name="email" placeholder="ex: myname@example.com"><span>example@example.com</span></div>
                    </div>
                    
                    <div class="div3 div-child">
                        <div class="div-w"><label for="sid">Student ID</label><input type="text" name="sname" ></div>
                        <div class="div-w"><label for="list">List of classes</label>
                            <select class="inp" name="gender" id="gender">
                                <option value="please select">please select</option>
                                <option value="one">male</option>
                                <option value="two">female</option>
                            </select>
                        </div> 
                    </div>
                </div>
                <div class="footer">
                  <button type="submit">Submit</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
