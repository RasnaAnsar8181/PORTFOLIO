<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sub-container">
            <form action="#">

                <div class="header">
                    <h1>Registration Form</h1>
                    <h4>Fill out the form carefully for registration</h4>
                </div>

        <!---------------------------------------------------------->
                <div class="content">
                    <table>
                        <tr class="row1" >
                            <td class="row1_td1"><label for="name">Student Name</label></td>
                            <td></td>
                        </tr>
                        <tr class="row2">
                            <td ><input type="text" name="name"><span>First Name</span></td>    
                            <td ><input type="text" name="name"><span>Last Name</span></td>   
                        </tr>  
                        
                        <tr class="row3">
                            <td class="td1">
                                <label for="gender">Gender</label>
                                <select class="inp"  name="gender" id="gender">
                                    <option value="please select">please select</option>
                                    <option value="one">one</option>
                                    <option value="two">two</option>
                                </select>
                            </td>
                            <td class="td1">   
                                <label for="email">Student E-mail</label>
                                <input type="email" name="email" placeholder="ex: myname@example.com">
                            </td>
                        </tr>
                        <tr class="row4">
                            <td></td>
                            <td><span>example@example.com</span></td>
                        </tr>
                        
                        <tr class="row5">
                            <td class="td1">
                                <label for="id">Student ID</label>
                                <input type="text" name="name"></td>
                            <td class="td1">
                                <label for="list">List of Classes</label>
                                <select class="inp" name="list" id="list">
                                    <option value="please select">please select</option>
                                    <option value="one">one</option>
                                    <option value="two">two</option>
                                </select>
                            </td>
                        </tr>
                    </table>
                </div>
        <!----------------------------------------------------------->
                 <div class="footer">
                    <button type="submit">Submit</button>
                 </div>   
                
            </form>
        </div>    
    </div>
</body>
</html>
